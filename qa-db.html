<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A DB 관리 — SOP Q&A Assistant</title>
    <style>
        :root {
            --bg: #f3f6fb;
            --panel: #ffffff;
            --ink: #172334;
            --muted: #6c7a8c;
            --line: #d9e2ef;
            --brand: #2159b5;
            --brand-soft: #e8f0ff;
            --navy: #14325c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(33,89,181,0.07), transparent 24%),
                radial-gradient(circle at top right, rgba(33,89,181,0.09), transparent 18%),
                var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 상단 바 */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 24px;
            background: rgba(255,255,255,0.92);
            border: 1px solid var(--line);
            box-shadow: 0 18px 40px rgba(31,41,55,0.06);
            backdrop-filter: blur(8px);
            margin-bottom: 24px;
        }

        .topbar-left { display: flex; align-items: center; gap: 14px; }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--ink);
            font-size: 0.84rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background .15s;
        }
        .back-btn:hover { background: var(--bg); }

        .topbar h1 { font-size: 1.3rem; color: var(--ink); }
        .topbar p  { font-size: 0.88rem; color: var(--muted); margin-top: 3px; }

        .badge {
            display: inline-flex; align-items: center;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge-blue { background: var(--brand-soft); color: var(--brand); }

        /* 툴바 */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .toolbar-left { display: flex; align-items: center; gap: 10px; }

        .search-wrap {
            position: relative;
        }
        .search-wrap svg {
            position: absolute; left: 10px; top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        #qaSearch {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 12px 8px 34px;
            font-size: 0.86rem;
            outline: none;
            width: 260px;
            background: var(--panel);
            transition: border-color .15s;
        }
        #qaSearch:focus { border-color: var(--brand); }

        .filter-select {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.86rem;
            outline: none;
            background: var(--panel);
            cursor: pointer;
        }

        /* 테이블 패널 */
        .panel {
            background: var(--panel);
            border-radius: 20px;
            border: 1px solid var(--line);
            box-shadow: 0 4px 24px rgba(31,41,55,0.05);
            overflow: hidden;
        }

        .count-bar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .count-bar strong { color: var(--ink); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        thead tr {
            border-bottom: 2px solid var(--line);
            background: #fafbfd;
        }

        th {
            padding: 12px 16px;
            color: var(--muted);
            font-weight: 600;
            text-align: left;
            font-size: 0.82rem;
            letter-spacing: .02em;
        }

        tbody tr {
            border-bottom: 1px solid var(--line);
            transition: background .12s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f5f8ff; }

        td { padding: 12px 16px; vertical-align: top; }

        .num-cell { color: var(--muted); width: 44px; }
        .sop-cell { width: 170px; }
        .keyword-cell { }
        .answer-cell { width: 280px; color: var(--muted); line-height: 1.6; }

        .sop-badge {
            display: inline-block;
            background: var(--brand-soft);
            color: var(--brand);
            border-radius: 5px;
            padding: 2px 7px;
            font-size: 0.78rem;
            font-weight: 600;
            margin: 2px 2px 2px 0;
        }

        .kw-tag {
            display: inline-block;
            background: #f1f5f9;
            border-radius: 5px;
            padding: 2px 7px;
            font-size: 0.78rem;
            margin: 2px 2px 2px 0;
            color: var(--ink);
            line-height: 1.6;
        }

        .empty-state {
            padding: 60px 24px;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* 확장 행 */
        .expand-btn {
            background: none; border: none;
            color: var(--brand); font-size: 0.78rem;
            cursor: pointer; padding: 4px 0 0;
            display: block;
        }
        .answer-full {
            display: none;
            margin-top: 6px;
            white-space: pre-wrap;
            font-size: 0.82rem;
            line-height: 1.7;
            color: var(--ink);
            background: #f8faff;
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid var(--brand-soft);
        }
        .answer-full.open { display: block; }

        @media (max-width: 768px) {
            #qaSearch { width: 180px; }
            .answer-cell { display: none; }
        }
    </style>
</head>
<body>
    <div class="page">

        <!-- 상단 바 -->
        <div class="topbar">
            <div class="topbar-left">
                <a class="back-btn" href="./admin-dashboard.html">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    대시보드로
                </a>
                <div>
                    <h1>🗂️ Q&A DB 관리</h1>
                    <p>탑재된 오프라인 키워드 Q&A 항목 목록입니다. 항목 행을 클릭하면 전체 답변을 확인할 수 있습니다.</p>
                </div>
            </div>
            <span class="badge badge-blue" id="totalBadge">로딩 중…</span>
        </div>

        <!-- 검색 / 필터 툴바 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="search-wrap">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="qaSearch" type="search" placeholder="키워드 · SOP ID · 답변 검색…" oninput="filterTable(this.value)">
                </div>
                <select class="filter-select" id="sopFilter" onchange="filterTable(document.getElementById('qaSearch').value)">
                    <option value="">전체 SOP</option>
                    <option>SOP-MFG-001</option>
                    <option>SOP-QA-002</option>
                    <option>SOP-QC-003</option>
                    <option>SOP-MFG-004</option>
                    <option>SOP-MFG-005</option>
                    <option>SOP-QA-006</option>
                    <option>SOP-QA-007</option>
                    <option>SOP-QC-008</option>
                    <option>SOP-QC-009</option>
                    <option>SOP-ENG-010</option>
                </select>
            </div>
            <span id="filterCount" style="font-size:0.84rem;color:var(--muted);"></span>
        </div>

        <!-- 테이블 -->
        <div class="panel">
            <div class="count-bar">
                <strong id="shownCount">0</strong>건 표시 중
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th class="num-cell">#</th>
                            <th class="sop-cell">출처 SOP</th>
                            <th class="keyword-cell">인식 키워드</th>
                            <th class="answer-cell">답변</th>
                        </tr>
                    </thead>
                    <tbody id="qaBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let allEntries = [];

        async function loadQaDb() {
            try {
                const res = await fetch('./sop-qa-demo.html');
                const html = await res.text();
                const match = html.match(/const QA_DB\s*=\s*(\[[\s\S]*?\]);[\s\n]*\/\/ 기본 응답/);
                if (!match) return [];
                return Function('"use strict"; return ' + match[1])();
            } catch (e) {
                return [];
            }
        }

        function renderRows(entries) {
            const tbody = document.getElementById('qaBody');
            document.getElementById('shownCount').textContent = entries.length;

            if (!entries.length) {
                tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">검색 결과가 없습니다.</div></td></tr>`;
                return;
            }

            tbody.innerHTML = entries.map((qa, i) => {
                const realIdx = allEntries.indexOf(qa);
                const sources = qa.sources.map(s => {
                    const id = s.split(' - ')[0];
                    return `<span class="sop-badge">${id}</span>`;
                }).join('');
                const keywords = qa.keywords.map(k => `<span class="kw-tag">${k}</span>`).join('');
                const preview = qa.answer.replace(/\*\*/g, '').split('\n').find(l => l.trim()) || '';
                const full = qa.answer.replace(/\*\*/g, '').trim();

                return `<tr>
                    <td class="num-cell">${i + 1}</td>
                    <td class="sop-cell">${sources}</td>
                    <td class="keyword-cell">
                        <div style="line-height:2;">${keywords}</div>
                    </td>
                    <td class="answer-cell">
                        <div>${preview.slice(0, 60)}${preview.length > 60 ? '…' : ''}</div>
                        <button class="expand-btn" onclick="toggleAnswer(this)">전체 답변 보기 ▾</button>
                        <div class="answer-full">${full}</div>
                    </td>
                </tr>`;
            }).join('');
        }

        function toggleAnswer(btn) {
            const box = btn.nextElementSibling;
            const isOpen = box.classList.toggle('open');
            btn.textContent = isOpen ? '접기 ▴' : '전체 답변 보기 ▾';
        }

        function filterTable(q) {
            const lower = q.toLowerCase();
            const sopFilter = document.getElementById('sopFilter').value;

            let filtered = allEntries;

            if (sopFilter) {
                filtered = filtered.filter(qa =>
                    qa.sources.some(s => s.includes(sopFilter))
                );
            }

            if (lower) {
                filtered = filtered.filter(qa =>
                    qa.keywords.some(k => k.includes(lower)) ||
                    qa.sources.some(s => s.toLowerCase().includes(lower)) ||
                    qa.answer.toLowerCase().includes(lower)
                );
            }

            renderRows(filtered);
        }

        async function init() {
            allEntries = await loadQaDb();
            document.getElementById('totalBadge').textContent = `총 ${allEntries.length}건`;
            renderRows(allEntries);
        }

        init();
    </script>
</body>
</html>
