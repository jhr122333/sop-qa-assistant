<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOP Q&A Assistant | 제약 GMP 데모</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: #f0f4fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── 헤더 ── */
        .header {
            background: white;
            color: #1a202c;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .header-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #2e72d2, #63b3ed);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .header h1 { font-size: 0.98rem; font-weight: 700; letter-spacing: -0.02em; color: #1a202c; }
        .header .subtitle { font-size: 0.7rem; color: #718096; margin-top: 1px; }

        .demo-badge {
            display: flex; align-items: center; gap: 8px;
            background: #f0f4fa;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4a5568;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 7px 16px;
            border-radius: 20px;
            background: #2e72d2;
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .demo-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── 메인 레이아웃 ── */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ── 사이드바 ── */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid #f0f4fa;
        }

        .sidebar-header h2 {
            font-size: 0.68rem;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .doc-list { overflow-y: auto; flex: 1; }

        .doc-item {
            padding: 11px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f7fafc;
            border-left: 3px solid transparent;
            transition: all 0.15s;
        }

        .doc-item:hover { background: #f7fafc; }

        .doc-item.active {
            background: #ebf4ff;
            border-left-color: #2e72d2;
        }

        .doc-badge {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 0.63rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 5px;
        }

        .badge-mfg { background: #fef3c7; color: #92400e; }
        .badge-qa  { background: #d1fae5; color: #065f46; }
        .badge-qc  { background: #dbeafe; color: #1e40af; }

        .doc-name { font-size: 0.81rem; font-weight: 600; color: #2d3748; line-height: 1.35; }
        .doc-meta { font-size: 0.67rem; color: #a0aec0; margin-top: 3px; }

        /* 문서 미리보기 */
        .doc-preview {
            border-top: 1px solid #e2e8f0;
            padding: 14px 16px;
            background: #f7fafc;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .doc-preview-title { font-size: 0.78rem; font-weight: 700; color: #2d3748; margin-bottom: 8px; }
        .section-chips { display: flex; flex-wrap: wrap; gap: 4px; }
        .section-chip { padding: 2px 8px; background: #e2e8f0; border-radius: 12px; font-size: 0.62rem; color: #4a5568; }

        /* ── 채팅 영역 ── */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        /* 채팅 상단 바 */
        .chat-header {
            padding: 14px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #2e72d2 0%, #63b3ed 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(46,114,210,0.28);
        }

        .chat-header h2 { font-size: 0.92rem; font-weight: 700; color: #1a202c; }
        .chat-header p  { font-size: 0.72rem; color: #718096; margin-top: 1px; }

        /* 모델 칩 */
        .model-chip {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            background: #f0f4fa;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.71rem;
            color: #4a5568;
            font-weight: 600;
        }

        .model-dot { width: 6px; height: 6px; border-radius: 50%; background: #48bb78; }

        /* ── 메시지 영역 ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f7f9fc;
        }

        /* 웰컴 카드 */
        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 32px 28px;
            border: 1px solid #e2e8f0;
            max-width: 560px;
            align-self: center;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }

        .welcome-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #2e72d2, #63b3ed);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 16px;
            box-shadow: 0 4px 14px rgba(46,114,210,0.3);
        }

        .welcome-card h3 { font-size: 1.1rem; font-weight: 700; color: #1a202c; margin-bottom: 10px; }
        .welcome-card p  { font-size: 0.83rem; color: #718096; line-height: 1.75; }

        .sample-qs { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; text-align: left; }

        .sample-q {
            padding: 10px 16px;
            background: #f7f9fc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.81rem;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sample-q:hover {
            background: #ebf4ff;
            border-color: #2e72d2;
            color: #1e40af;
            transform: translateX(3px);
        }

        /* 메시지 버블 */
        .msg { display: flex; gap: 10px; max-width: 78%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.assistant { align-self: flex-start; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.user .msg-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .msg.assistant .msg-avatar {
            background: linear-gradient(135deg, #2e72d2, #63b3ed);
            color: white;
            box-shadow: 0 2px 6px rgba(46,114,210,0.25);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.875rem;
            line-height: 1.72;
            color: #2d3748;
            background: white;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            word-break: break-word;
        }

        .msg.user .msg-bubble {
            background: linear-gradient(135deg, #2e72d2, #4a9de8);
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 2px 10px rgba(46,114,210,0.28);
        }

        .msg.assistant .msg-bubble {
            border-radius: 4px 18px 18px 18px;
        }

        .citation-box {
            margin-top: 12px;
            padding: 10px 14px;
            background: #ebf4ff;
            border-left: 3px solid #2e72d2;
            border-radius: 0 10px 10px 0;
            font-size: 0.75rem;
            color: #4a5568;
            line-height: 1.6;
        }

        .citation-box strong { color: #1e40af; }

        .debug-box {
            margin-top: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
            overflow: hidden;
        }

        .debug-box summary {
            cursor: pointer;
            padding: 9px 13px;
            font-size: 0.73rem;
            color: #718096;
            font-weight: 600;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .debug-box summary::-webkit-details-marker { display: none; }

        .debug-box pre {
            margin: 0;
            padding: 0 13px 13px;
            font-size: 0.68rem;
            line-height: 1.6;
            color: #2d3748;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        /* 타이핑 */
        .typing-wrap { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }

        .typing-dot {
            width: 7px; height: 7px;
            background: #93c5fd;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.25); opacity: 1; }
        }

        /* ── 입력창 ── */
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #f7f9fc;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row:focus-within {
            border-color: #2e72d2;
            box-shadow: 0 0 0 3px rgba(46,114,210,0.10);
            background: white;
        }

        .msg-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.875rem;
            resize: none;
            outline: none;
            max-height: 110px;
            font-family: inherit;
            color: #2d3748;
            line-height: 1.5;
            padding: 4px 0;
        }

        .msg-input::placeholder { color: #a0aec0; }

        .send-btn {
            width: 38px; height: 38px;
            background: #2e72d2;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.12s;
        }

        .send-btn:hover:not(:disabled) {
            background: #1a4e9e;
            transform: scale(1.06);
        }

        .send-btn:disabled { background: #cbd5e0; cursor: not-allowed; }

        .send-btn svg { pointer-events: none; }

        .input-hint { font-size: 0.67rem; color: #a0aec0; margin-top: 7px; text-align: right; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e0; }

        /* ── 문서 전체 보기 모달 ── */
        .doc-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,25,50,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .doc-modal.open { display: flex; }

        .doc-modal-inner {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 720px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0,0,0,0.18);
            overflow: hidden;
            animation: modal-in 0.18s ease;
        }

        @keyframes modal-in {
            from { opacity: 0; transform: translateY(14px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .doc-modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid #f0f4fa;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .doc-modal-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .doc-modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a202c;
            line-height: 1.4;
        }

        .doc-modal-meta {
            font-size: 0.71rem;
            color: #a0aec0;
            margin-top: 4px;
        }

        .doc-modal-close {
            background: #f7f9fc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.88rem;
            color: #718096;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 12px;
            transition: background 0.15s;
        }

        .doc-modal-close:hover { background: #e2e8f0; color: #2d3748; }

        .doc-modal-body {
            overflow-y: auto;
            padding: 20px 24px;
            flex: 1;
        }

        .doc-section {
            margin-bottom: 22px;
            padding-bottom: 22px;
            border-bottom: 1px solid #f0f4fa;
        }

        .doc-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .doc-section-title {
            font-size: 0.87rem;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #2e72d2;
        }

        .doc-section-content {
            font-size: 0.82rem;
            color: #4a5568;
            line-height: 1.85;
            white-space: pre-wrap;
            padding-left: 10px;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="header-logo">🧪</div>
        <div>
            <h1>SOP Q&amp;A Assistant</h1>
            <div class="subtitle">제약 · 바이오 GMP 문서 기반 AI Q&amp;A</div>
        </div>
    </div>
    <div class="header-actions">
        <div class="demo-badge">
            <div class="demo-dot"></div>
            데모 운영 중
        </div>
        <a class="header-link" href="/admin-dashboard.html">관리자 대시보드 →</a>
    </div>
</header>

<div class="main">

    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="sidebar-header"><h2>📄 SOP 문서 목록</h2></div>
        <div class="doc-list" id="docList"></div>
        <div class="doc-preview" id="docPreview">
            <div class="doc-preview-title" id="previewTitle"></div>
            <div class="section-chips" id="previewChips"></div>
        </div>
    </aside>

    <!-- 채팅 -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-avatar">🤖</div>
            <div>
                <h2>SOP Q&amp;A 어시스턴트</h2>
                <p>GMP 표준 작업 절차서를 기반으로 정확한 답변을 드립니다</p>
            </div>
            <div class="model-chip">
                <div class="model-dot"></div>
                RAG · 하이브리드 검색
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome-card" id="welcomeCard">
                <div class="welcome-icon">🤖</div>
                <h3>SOP Q&amp;A 어시스턴트입니다</h3>
                <p>제약 GMP SOP 10종을 기반으로 절차·기준·문서 위치를 정확히 안내합니다.<br>궁금한 내용을 바로 입력하거나 아래 샘플 질문을 눌러 시작하세요.</p>
                <div class="sample-qs">
                    <button class="sample-q" onclick="triggerSample(this)">🔬 설비 세척 후 Swab Test의 합격 기준은 무엇인가요?</button>
                    <button class="sample-q" onclick="triggerSample(this)">📋 MACO(최대 허용 이월량) 계산 방법을 설명해 주세요</button>
                    <button class="sample-q" onclick="triggerSample(this)">🏭 Grade A 청정구역의 입자 및 미생물 기준치는?</button>
                    <button class="sample-q" onclick="triggerSample(this)">📑 배치 기록 검토 시 OOS 발생하면 어떻게 처리하나요?</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea class="msg-input" id="msgInput" placeholder="SOP 관련 질문을 입력하세요…" rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMsg()" title="전송">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">Enter: 전송 &nbsp;·&nbsp; Shift+Enter: 줄바꿈</div>
        </div>
    </div>
</div>

<!-- 문서 전체 보기 모달 -->
<div class="doc-modal" id="docModal" onclick="closeModal(event)">
    <div class="doc-modal-inner">
        <div class="doc-modal-header">
            <div>
                <span class="doc-modal-badge" id="modalBadge"></span>
                <div class="doc-modal-title" id="modalTitle"></div>
                <div class="doc-modal-meta" id="modalMeta"></div>
            </div>
            <button class="doc-modal-close" onclick="closeDocModal()">✕</button>
        </div>
        <div class="doc-modal-body" id="modalBody"></div>
    </div>
</div>

<script>
// ================================================================
// SOP 문서 데이터
// ================================================================
let DOCS = [];

function getBadgeClass(department) {
    if (department === '제조') return 'badge-mfg';
    if (department === '품질보증') return 'badge-qa';
    return 'badge-qc';
}

function mapDocumentForUI(doc) {
    return {
        id: doc.document_id,
        title: doc.title_ko,
        category: doc.department,
        badgeClass: getBadgeClass(doc.department),
        version: `v${doc.version}`,
        date: doc.effective_date,
        sections: (doc.sections || []).map(section => ({
            title: section.section_title,
            content: section.content
        }))
    };
}

async function loadDocs() {
    const res = await fetch('./data/documents/sop-documents.json');
    if (!res.ok) {
        throw new Error(`문서 데이터를 불러오지 못했습니다: ${res.status}`);
    }

    const payload = await res.json();
    DOCS = (payload.documents || []).map(mapDocumentForUI);
}

function renderDocLoadError() {
    document.getElementById('docList').innerHTML = `
        <div class="doc-item" style="cursor: default;">
            <div class="doc-name">문서 로딩 실패</div>
            <div class="doc-meta">로컬 서버에서 실행하거나 data/documents 경로를 확인해 주세요.</div>
        </div>
    `;
}

// ================================================================
// 사전 정의 Q&A 데이터베이스
// ================================================================
const QA_DB = [
    {
        keywords: ['swab','스왑','합격','기준','세척 검증','검증 기준','린스'],
        answer: `세척 검증의 합격 기준은 다음과 같습니다.

**Swab Test (표면 시험)**
- 합격 기준: **≤ 4 μg/cm²** (또는 MACO로부터 계산된 표면 한계값)
- 설비 표면 25 cm² 면적을 예비 습윤 면봉으로 채취

- "Swab Test 합격 기준은?"
- "MACO 계산 방법은?"
- "Grade A 미생물 기준치는?"
- "OOS 발생 시 처리 절차는?"`
];

// ================================================================
// 상태
// ================================================================
let loading = false;
let selectedDoc = null;
let answerCount = 0;
const CHAT_API_URL = '/api/chat';

// ================================================================
// 사이드바
// ================================================================
function renderSidebar() {
    if (DOCS.length === 0) {
        document.getElementById('docList').innerHTML = `
            <div class="doc-item" style="cursor: default;">
                <div class="doc-name">문서가 없습니다</div>
                <div class="doc-meta">데이터 파일을 먼저 불러와 주세요.</div>
            </div>
        `;
        return;
    }

    document.getElementById('docList').innerHTML = DOCS.map(doc => `
        <div class="doc-item ${selectedDoc === doc.id ? 'active' : ''}"
             onclick="selectDoc('${doc.id}')">
            <span class="doc-badge ${doc.badgeClass}">${doc.id}</span>
            <div class="doc-name">${doc.title}</div>
            <div class="doc-meta">${doc.category} · ${doc.version} · ${doc.date}</div>
        </div>
    `).join('');
}

function selectDoc(id) {
    selectedDoc = id;
    renderSidebar();
    const doc = DOCS.find(d => d.id === id);
    if (!doc) return;

    // 사이드바 칩 업데이트
    document.getElementById('previewTitle').textContent = `📋 ${doc.title}`;
    document.getElementById('previewChips').innerHTML =
        doc.sections.map(s => `<span class="section-chip">${s.title}</span>`).join('');
    document.getElementById('docPreview').style.display = 'block';

    // 모달에 전체 내용 채우기
    document.getElementById('modalBadge').textContent = doc.id;
    document.getElementById('modalBadge').className = `doc-modal-badge ${doc.badgeClass}`;
    document.getElementById('modalTitle').textContent = doc.title;
    document.getElementById('modalMeta').textContent = `${doc.category} · ${doc.version} · ${doc.date}`;
    document.getElementById('modalBody').innerHTML = doc.sections.map(s => `
        <div class="doc-section">
            <div class="doc-section-title">${esc(s.title)}</div>
            <div class="doc-section-content">${esc(s.content)}</div>
        </div>
    `).join('');

    // 모달 열기
    document.getElementById('docModal').classList.add('open');
}

function closeDocModal() {
    document.getElementById('docModal').classList.remove('open');
}

function closeModal(e) {
    if (e.target.id === 'docModal') closeDocModal();
}

// ESC 키로 모달 닫기
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDocModal();
});

// ================================================================
// 질문 매칭
// ================================================================
function findAnswer(question) {
    const q = question.toLowerCase().replace(/\s/g, '');
    let best = null;
    let bestScore = 0;

    for (const qa of QA_DB) {
        let score = 0;
        for (const kw of qa.keywords) {
            if (q.includes(kw.replace(/\s/g, ''))) score++;
        }
        if (score > bestScore) {
            bestScore = score;
            best = qa;
        }
    }

    if (bestScore === 0) {
        return {
            answer: DEFAULT_ANSWERS[answerCount % DEFAULT_ANSWERS.length],
            sources: []
        };
    }
    return best;
}

// ================================================================
// UI 헬퍼
// ================================================================
function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(raw) {
    let t = esc(raw);
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // 테이블 처리 (간단)
    t = t.replace(/\|(.+)\|/g, (m) => `<span style="font-family:monospace;font-size:0.82rem;">${m}</span>`);
    t = t.replace(/\n/g, '<br>');
    return t;
}

function removeWelcome() {
    const wc = document.getElementById('welcomeCard');
    if (wc) wc.remove();
}

function appendUserMsg(text) {
    removeWelcome();
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
        <div class="msg-avatar">👤</div>
        <div class="msg-bubble">${esc(text)}</div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typingEl';
    div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble">
            <div class="typing-wrap">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>`;
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
}

function hideTyping() {
    const el = document.getElementById('typingEl');
    if (el) el.remove();
}

// 스트리밍 효과로 텍스트 출력
function streamText(bubble, fullText, onDone) {
    const chars = fullText.split('');
    let i = 0;
    let current = '';

    const interval = setInterval(() => {
        // 한 번에 3~6글자씩 출력 (빠른 스트리밍 느낌)
        const chunk = Math.floor(Math.random() * 4) + 3;
        for (let j = 0; j < chunk && i < chars.length; j++, i++) {
            current += chars[i];
        }
        bubble.innerHTML = fmt(current);
        document.getElementById('messages').scrollTop = 99999;

        if (i >= chars.length) {
            clearInterval(interval);
            if (onDone) onDone();
        }
    }, 18);
}

function appendAssistantMsg(answerObj) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    div.appendChild(av);
    div.appendChild(bubble);
    wrap.appendChild(div);

    // 출처 박스 준비 (스트리밍 완료 후 추가)
    streamText(bubble, answerObj.answer, () => {
        const citations = answerObj.citations || answerObj.sources || [];
        const formattedSources = citations.map((source) => {
            if (typeof source === 'string') return source;
            return `${source.document_id} - ${source.section_title} (v${source.version})`;
        });

        if (formattedSources.length > 0) {
            const cite = document.createElement('div');
            cite.className = 'citation-box';
            cite.innerHTML = `<strong>📌 출처</strong><br>${formattedSources.map(s => `• [${s}]`).join('<br>')}`;
            bubble.appendChild(cite);
            wrap.scrollTop = wrap.scrollHeight;
        }

        if (answerObj.retrieval_debug) {
            const debug = document.createElement('details');
            debug.className = 'debug-box';
            debug.innerHTML = `
                <summary>검색 디버그 보기</summary>
                <pre>${esc(JSON.stringify(answerObj.retrieval_debug, null, 2))}</pre>
            `;
            bubble.appendChild(debug);
            wrap.scrollTop = wrap.scrollHeight;
        }
    });
}

async function askViaApi(question) {
    const res = await fetch(CHAT_API_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ question })
    });

    if (!res.ok) {
        const errorPayload = await res.json().catch(() => ({}));
        const message = errorPayload.message || `API 요청 실패 (${res.status})`;
        throw new Error(message);
    }

    return res.json();
}

// ================================================================
// 메인 로직
// ================================================================
async function ask(question) {
    if (loading) return;
    loading = true;

    appendUserMsg(question);
    showTyping();

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = '생성 중…';

    // 실제 API 호출처럼 1~1.8초 대기
    const delay = 1000 + Math.random() * 800;
    await new Promise(r => setTimeout(r, delay));

    hideTyping();

    let result;
    try {
        result = await askViaApi(question);
    } catch (error) {
        console.error(error);
        result = findAnswer(question);
    }

    answerCount++;
    appendAssistantMsg(result);

    loading = false;
    btn.disabled = false;
    btn.textContent = '전송 ▶';
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || loading) return;
    input.value = '';
    input.style.height = 'auto';
    ask(text);
}

function triggerSample(btn) {
    const q = btn.textContent.replace(/^[🔬📋🏭📑]\s*/, '');
    ask(q);
}

document.getElementById('msgInput').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

document.getElementById('msgInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
});

loadDocs()
    .then(() => {
        renderSidebar();
    })
    .catch((err) => {
        console.error(err);
        renderDocLoadError();
    });
</script>
