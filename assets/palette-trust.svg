<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" rx="36" fill="#F4F7FB"/>
  <rect x="48" y="48" width="1104" height="704" rx="30" fill="#FFFFFF"/>
