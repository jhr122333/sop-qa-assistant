  <text x="622" y="616" fill="#173563" font-size="28" font-family="Arial, sans-serif" font-weight="700">인상</text>
  <text x="622" y="654" fill="#40618F" font-size="22" font-family="Arial, sans-serif">“믿을 수 있는 제약 QA 시스템” 같은 느낌</text>

  <text x="115" y="340" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="700">#12325C</text>
