  <text x="84" y="224" fill="#D9E8FF" font-size="24" font-family="Arial, sans-serif">정확성, 안정성, 신뢰감이 강한 정석형 톤</text>

  <rect x="84" y="282" width="210" height="168" rx="24" fill="#12325C"/>
  <rect x="314" y="282" width="210" height="168" rx="24" fill="#2159B5"/>
  <rect x="544" y="282" width="210" height="168" rx="24" fill="#EAF1FB"/>
  <rect x="774" y="282" width="210" height="168" rx="24" fill="#F8FAFC" stroke="#D5DFEC"/>

  <text x="84" y="484" fill="#172334" font-size="22" font-family="Arial, sans-serif" font-weight="700">추천 사용처</text>
  <text x="84" y="520" fill="#5F6F83" font-size="22" font-family="Arial, sans-serif">QA, SOP, 문서 기반 B2B 도구, 관리자 대시보드</text>

